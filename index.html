<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Recetas por Calorías</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            app: {
              bg: '#f6f3ed',
              panel: '#ffffff',
              sage: '#43695a',
              sagedeep: '#24483c',
              tomato: '#c7533d',
              gold: '#d29d30',
              blue: '#38698a',
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #f6f3ed;
      -webkit-tap-highlight-color: transparent;
    }
    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }
    input[type="number"] {
      font-size: 24px !important; 
      -moz-appearance: textfield;
    }
    input[type="number"]::-webkit-inner-spin-button, 
    input[type="number"]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
    
    /* Animación de carga */
    .loader {
      border: 4px solid #e2e8f0;
      border-top: 4px solid #43695a;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="text-slate-800 antialiased pb-20">

  <main class="max-w-md mx-auto bg-app-bg min-h-screen shadow-2xl relative flex flex-col">
    
    <!-- Encabezado -->
    <header class="bg-app-panel px-6 py-8 rounded-b-3xl shadow-sm z-10 relative text-center">
      <div class="w-16 h-16 bg-green-50 rounded-2xl mx-auto flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-app-sage" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
      </div>
      <h1 class="text-3xl font-extrabold text-app-sagedeep leading-tight mb-2">Chef Inteligente</h1>
      <p class="text-slate-500 text-sm font-medium">Dime cuántas calorías tienes disponibles y te crearé la receta perfecta.</p>
    </header>

    <!-- Controles -->
    <section class="px-5 mt-8">
      <div class="bg-app-panel rounded-3xl p-6 shadow-sm border border-slate-100 flex flex-col items-center gap-5">
        
        <!-- Selector Dulce/Salado -->
        <div class="w-full flex bg-slate-100 rounded-xl p-1">
          <label class="flex-1 text-center cursor-pointer relative">
            <input type="radio" name="flavor" value="salada" class="peer sr-only" checked />
            <div class="py-2.5 rounded-lg peer-checked:bg-white peer-checked:shadow-sm peer-checked:text-app-sagedeep font-bold text-slate-400 text-sm transition-all flex items-center justify-center gap-2">
              <span>🧂 Salado</span>
            </div>
          </label>
          <label class="flex-1 text-center cursor-pointer relative">
            <input type="radio" name="flavor" value="dulce" class="peer sr-only" />
            <div class="py-2.5 rounded-lg peer-checked:bg-white peer-checked:shadow-sm peer-checked:text-app-tomato font-bold text-slate-400 text-sm transition-all flex items-center justify-center gap-2">
              <span>🍰 Dulce</span>
            </div>
          </label>
        </div>

        <label class="w-full text-center">
          <span class="text-sm font-bold text-slate-400 uppercase tracking-widest block mb-3">Tus Calorías</span>
          <div class="relative flex items-center justify-center max-w-[200px] mx-auto">
            <input id="caloriesInput" type="number" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-4 px-4 text-center font-black text-slate-700 outline-none focus:border-app-sage focus:bg-white transition-colors" placeholder="Ej: 450" />
            <span class="absolute right-4 text-slate-400 font-bold">kcal</span>
          </div>
        </label>
        
        <button id="generateBtn" class="w-full py-4 rounded-2xl bg-app-sagedeep text-white font-extrabold text-lg active:scale-95 transition-transform shadow-md hover:bg-app-sage flex justify-center items-center gap-2">
          <span>Generar Receta</span>
          <svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
        </button>
      </div>
      
      <!-- Mensaje de error (oculto por defecto) -->
      <div id="errorMsg" class="hidden mt-4 p-4 rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm font-semibold text-center">
        Por favor, ingresa un número de calorías válido (ej. entre 100 y 3000).
      </div>
    </section>

    <!-- Estado de Carga -->
    <section id="loadingState" class="px-5 mt-10 hidden flex-col items-center justify-center gap-4 opacity-0 transition-opacity duration-300">
      <div class="loader"></div>
      <p class="text-app-sage font-bold animate-pulse text-center">Consultando al Chef...<br><span class="text-xs font-normal text-slate-500">Creando receta a medida</span></p>
    </section>

    <!-- Resultados de la Receta -->
    <section id="recipeResult" class="px-5 mt-8 mb-10 hidden opacity-0 transition-opacity duration-500 translate-y-4">
      
      <div class="bg-app-panel rounded-3xl p-6 shadow-lg border border-slate-100 relative overflow-hidden">
        <!-- Decoración de fondo -->
        <div class="absolute top-0 right-0 w-32 h-32 bg-app-sage/5 rounded-full -mr-10 -mt-10 blur-xl"></div>
        
        <div class="relative z-10">
          <div class="flex items-start justify-between gap-4 mb-2">
            <h2 id="recipeTitle" class="text-2xl font-extrabold text-slate-800 leading-tight">Cargando...</h2>
            <div class="bg-app-gold text-white text-xs font-black px-3 py-1.5 rounded-xl whitespace-nowrap shrink-0 shadow-sm">
              <span id="recipeKcal">0</span> kcal
            </div>
          </div>
          
          <p id="recipeDesc" class="text-slate-500 text-sm font-medium mb-6 italic">Descripción...</p>
          
          <div class="mb-6">
            <h3 class="text-sm font-bold text-app-sagedeep uppercase tracking-widest mb-3 flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
              Ingredientes
            </h3>
            <ul id="ingredientsList" class="flex flex-col gap-2">
              <!-- Renderizado dinámico -->
            </ul>
          </div>
          
          <div>
            <h3 class="text-sm font-bold text-app-sagedeep uppercase tracking-widest mb-3 flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              Instrucciones
            </h3>
            <ol id="instructionsList" class="flex flex-col gap-4">
              <!-- Renderizado dinámico -->
            </ol>
          </div>
          
          <!-- Botón Siguiente Opción -->
          <button id="nextBtn" class="w-full mt-8 py-4 rounded-xl border-2 border-app-sage text-app-sagedeep font-extrabold text-sm hover:bg-green-50 active:scale-95 transition-all flex justify-center items-center gap-2">
            <span>Esta no me gusta, siguiente opción</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
          </button>

        </div>
      </div>
    </section>

  </main>

  <script>
    const dom = {
      input: document.getElementById('caloriesInput'),
      btn: document.getElementById('generateBtn'),
      nextBtn: document.getElementById('nextBtn'),
      error: document.getElementById('errorMsg'),
      loading: document.getElementById('loadingState'),
      result: document.getElementById('recipeResult'),
      title: document.getElementById('recipeTitle'),
      kcal: document.getElementById('recipeKcal'),
      desc: document.getElementById('recipeDesc'),
      ingList: document.getElementById('ingredientsList'),
      instList: document.getElementById('instructionsList')
    };

    // Función para manejar la visibilidad de las secciones
    function setUIState(state) {
      if (state === 'idle') {
        dom.loading.classList.add('hidden');
        dom.loading.style.opacity = '0';
        dom.error.classList.add('hidden');
        dom.btn.disabled = false;
        dom.btn.innerHTML = `<span>Generar Receta</span><svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>`;
      } else if (state === 'loading') {
        dom.result.classList.add('hidden');
        dom.result.style.opacity = '0';
        dom.error.classList.add('hidden');
        dom.btn.disabled = true;
        dom.btn.innerHTML = `<span>Cocinando...</span>`;
        dom.loading.classList.remove('hidden');
        setTimeout(() => dom.loading.style.opacity = '1', 10);
      } else if (state === 'success') {
        dom.loading.classList.add('hidden');
        dom.loading.style.opacity = '0';
        dom.btn.disabled = false;
        dom.btn.innerHTML = `<span>Buscar otra cantidad</span>`;
        dom.result.classList.remove('hidden');
        // Pequeño delay para la animación de entrada
        setTimeout(() => {
          dom.result.style.opacity = '1';
          dom.result.style.transform = 'translateY(0)';
        }, 50);
      } else if (state === 'error') {
        dom.loading.classList.add('hidden');
        dom.loading.style.opacity = '0';
        dom.btn.disabled = false;
        dom.btn.innerHTML = `<span>Intentar de nuevo</span>`;
        dom.error.classList.remove('hidden');
      }
    }

    // Llamada a la API de Gemini
    async function generateRecipe(calories) {
      setUIState('loading');
      
      const flavor = document.querySelector('input[name="flavor"]:checked').value;
      const variant = Math.floor(Math.random() * 10000); // Forzamos a la IA a dar una respuesta distinta
      
      const apiKey = ""; // API key se inyecta en runtime
      const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

      const payload = {
        contents: [{
          role: "user",
          parts: [{ text: `Crea una receta ${flavor} realista y apetitosa que contenga aproximadamente ${calories} calorías en total. Debe ser MUY FÁCIL y rápida de preparar, requiriendo muy poca elaboración técnica. (ID de variante para forzar creatividad: ${variant}).` }]
        }],
        systemInstruction: {
          parts: [{ text: "Eres un chef experto y nutricionista. Tu objetivo es crear recetas reales, saludables y bien estructuradas que se ajusten a la solicitud calórica del usuario. Especialízate en recetas exprés, súper prácticas y para principiantes (pocos ingredientes, mínimo esfuerzo y sin complicaciones en la cocina). Debes responder EXCLUSIVAMENTE utilizando la estructura JSON solicitada. Las cantidades de los ingredientes deben ser claras (gramos, tazas, cucharadas)." }]
        },
        generationConfig: {
          responseMimeType: "application/json",
          responseSchema: {
            type: "OBJECT",
            properties: {
              recipeName: { type: "STRING" },
              calories: { type: "INTEGER" },
              description: { type: "STRING" },
              ingredients: {
                type: "ARRAY",
                items: {
                  type: "OBJECT",
                  properties: {
                    item: { type: "STRING" },
                    quantity: { type: "STRING" }
                  }
                }
              },
              instructions: {
                type: "ARRAY",
                items: { type: "STRING" }
              }
            },
            required: ["recipeName", "calories", "description", "ingredients", "instructions"]
          }
        }
      };

      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if (result.candidates && result.candidates.length > 0 && result.candidates[0].content && result.candidates[0].content.parts.length > 0) {
          const jsonString = result.candidates[0].content.parts[0].text;
          const recipeData = JSON.parse(jsonString);
          renderRecipe(recipeData);
        } else {
          throw new Error("Formato de respuesta inesperado");
        }
      } catch (error) {
        console.error("Error al generar la receta:", error);
        dom.error.textContent = "Hubo un problema al contactar al chef. Por favor, intenta de nuevo.";
        setUIState('error');
      }
    }

    // Renderizar los datos en el HTML
    function renderRecipe(data) {
      dom.title.textContent = data.recipeName;
      dom.kcal.textContent = data.calories;
      dom.desc.textContent = `"${data.description}"`;
      
      // Limpiar listas
      dom.ingList.innerHTML = '';
      dom.instList.innerHTML = '';

      // Render ingredientes
      data.ingredients.forEach(ing => {
        const li = document.createElement('li');
        li.className = "flex justify-between items-center bg-slate-50 py-2 px-3 rounded-lg border border-slate-100 text-sm";
        li.innerHTML = `
          <span class="font-semibold text-slate-700">${ing.item}</span>
          <span class="font-bold text-app-sage text-right shrink-0 ml-4">${ing.quantity}</span>
        `;
        dom.ingList.appendChild(li);
      });

      // Render instrucciones
      data.instructions.forEach((step, index) => {
        const li = document.createElement('li');
        li.className = "flex gap-3 text-sm text-slate-600 leading-relaxed";
        li.innerHTML = `
          <span class="flex items-center justify-center w-6 h-6 rounded-full bg-green-100 text-app-sagedeep font-black text-xs shrink-0 mt-0.5">${index + 1}</span>
          <span>${step}</span>
        `;
        dom.instList.appendChild(li);
      });

      setUIState('success');
    }

    // Eventos
    dom.btn.addEventListener('click', () => {
      const cals = parseInt(dom.input.value, 10);
      
      // Validación básica
      if (isNaN(cals) || cals < 50 || cals > 5000) {
        dom.error.textContent = "Ingresa un valor válido (entre 50 y 5000 kcal).";
        dom.error.classList.remove('hidden');
        dom.result.classList.add('hidden');
        return;
      }
      
      dom.error.classList.add('hidden');
      generateRecipe(cals);
    });
    
    // Evento para el botón de "Siguiente"
    dom.nextBtn.addEventListener('click', () => {
      const cals = parseInt(dom.input.value, 10);
      generateRecipe(cals);
    });
    
    // Permitir generar con la tecla Enter
    dom.input.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        dom.btn.click();
      }
    });

  </script>
</body>
</html>
