<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <!-- Configuración estricta de viewport para evitar zoom en iOS y comportarse como app nativa -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Plan Diario de Comidas</title>
  
  <!-- Carga de fuente Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Carga de Tailwind CSS para diseño adaptable y móvil -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Configuración de colores personalizados en Tailwind -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            app: {
              bg: '#f6f3ed',
              panel: '#ffffff',
              sage: '#43695a',
              sagedeep: '#24483c',
              tomato: '#c7533d',
              gold: '#d29d30',
              blue: '#38698a',
            }
          }
        }
      }
    }
  </script>

  <style>
    /* Ajustes extra para comportamiento táctil y estética de App */
    body {
      background-color: #f6f3ed;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* Ocultar barra de scroll para limpieza visual */
    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }

    /* Forzar tamaño de fuente en inputs para evitar zoom en iPhone */
    input[type="number"], input[type="search"], textarea {
      font-size: 16px !important; 
    }
    
    /* Ocultar flechas de los inputs numéricos */
    input[type="number"]::-webkit-inner-spin-button, 
    input[type="number"]::-webkit-outer-spin-button { 
      -webkit-appearance: none; 
      margin: 0; 
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }

    .transition-all { transition: all 0.3s ease; }
  </style>
</head>
<body class="text-slate-800 antialiased pb-20">

  <!-- Contenedor principal estilo App (máximo ancho de móvil/tablet) -->
  <main class="max-w-md mx-auto bg-app-bg min-h-screen shadow-2xl relative">
    
    <header class="bg-app-panel px-5 py-6 rounded-b-3xl shadow-sm z-10 relative">
      <p class="text-app-tomato text-xs font-bold uppercase tracking-wider mb-1">Registro Diario</p>
      <h1 class="text-3xl font-extrabold text-app-sagedeep leading-tight mb-6">Mis Comidas</h1>
      
      <div class="grid grid-cols-2 gap-4">
        <label class="flex flex-col">
          <span class="text-xs font-bold text-slate-500 mb-1">Meta Calorías</span>
          <div class="relative">
            <input id="dailyBudget" type="number" class="w-full bg-slate-100 rounded-xl py-3 px-4 text-lg font-bold text-slate-700 outline-none focus:ring-2 focus:ring-app-sage" value="2000" />
            <span class="absolute right-4 top-3 text-sm text-slate-400 font-bold">kcal</span>
          </div>
        </label>
        <label class="flex flex-col">
          <span class="text-xs font-bold text-slate-500 mb-1">Meta Proteína</span>
          <div class="relative">
            <input id="proteinBudget" type="number" class="w-full bg-slate-100 rounded-xl py-3 px-4 text-lg font-bold text-slate-700 outline-none focus:ring-2 focus:ring-app-sage" value="150" />
            <span class="absolute right-4 top-3 text-sm text-slate-400 font-bold">g</span>
          </div>
        </label>
      </div>
    </header>

    <section class="px-5 mt-6">
      <div class="grid grid-cols-2 gap-3">
        <div class="bg-app-panel rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-col justify-between">
          <span class="text-xs font-bold text-slate-500">Consumidas</span>
          <strong id="caloriesUsed" class="text-3xl font-extrabold text-app-sagedeep mt-2">0</strong>
          <span class="text-xs text-slate-400 font-semibold mt-1">kcal registradas</span>
        </div>
        <div class="bg-app-panel rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-col justify-between">
          <span class="text-xs font-bold text-slate-500">Pendientes</span>
          <strong id="caloriesLeft" class="text-3xl font-extrabold text-app-gold mt-2">2000</strong>
          <span class="text-xs text-slate-400 font-semibold mt-1">kcal libres</span>
        </div>
        <div class="bg-app-panel rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-col justify-between">
          <span class="text-xs font-bold text-slate-500">Proteína total</span>
          <strong id="proteinTotal" class="text-2xl font-extrabold text-app-blue mt-2">0 g</strong>
        </div>
        <div class="bg-app-panel rounded-2xl p-4 shadow-sm border border-slate-100 flex flex-col justify-between">
          <span class="text-xs font-bold text-slate-500">Falta proteína</span>
          <strong id="proteinLeft" class="text-2xl font-extrabold text-slate-700 mt-2">150 g</strong>
        </div>
      </div>
    </section>

    <section class="px-5 mt-6">
      <div class="bg-app-panel rounded-2xl p-5 shadow-sm border border-slate-100">
        <!-- Calorías -->
        <div class="mb-4">
          <div class="flex justify-between text-xs font-bold mb-2">
            <span class="text-slate-500">Progreso Calorías</span>
            <span id="progressText" class="text-app-sage">0%</span>
          </div>
          <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden">
            <div id="progressBar" class="h-full bg-gradient-to-r from-app-sage to-app-gold transition-all duration-500" style="width: 0%"></div>
          </div>
        </div>
        <!-- Proteína -->
        <div class="mb-4">
          <div class="flex justify-between text-xs font-bold mb-2">
            <span class="text-slate-500">Progreso Proteína</span>
            <span id="proteinProgressText" class="text-app-blue">0%</span>
          </div>
          <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden">
            <div id="proteinProgressBar" class="h-full bg-gradient-to-r from-blue-300 to-app-blue transition-all duration-500" style="width: 0%"></div>
          </div>
        </div>
        
        <div class="flex items-center justify-between mt-6 pt-4 border-t border-slate-100">
          <span id="closedMealsText" class="text-sm font-bold text-slate-500">0 comidas listas</span>
          <button id="resetDay" class="text-app-tomato text-sm font-bold px-4 py-2 rounded-lg border border-app-tomato/30 bg-red-50 active:bg-red-100 transition-colors">Limpiar día</button>
        </div>
      </div>
    </section>

    <section class="px-5 mt-6 flex flex-col gap-5">
      
      <!-- DESAYUNO -->
      <article class="bg-app-panel rounded-2xl p-5 shadow-sm border border-slate-100 transition-all duration-300" id="card-breakfast">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <span class="w-8 h-8 rounded-full bg-green-100 text-app-sagedeep flex items-center justify-center font-bold text-sm">01</span>
            <h2 class="font-extrabold text-lg">Desayuno</h2>
          </div>
          <span class="text-xs font-bold px-3 py-1 rounded-full bg-slate-100 text-slate-500" id="state-breakfast">Abierta</span>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-3">
          <label class="flex flex-col">
            <span class="text-xs font-bold text-slate-500 mb-1">Calorías</span>
            <input type="number" id="cal-breakfast" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-3 px-3 font-semibold text-slate-700 outline-none focus:border-app-sage" placeholder="0" />
          </label>
          <label class="flex flex-col">
            <span class="text-xs font-bold text-slate-500 mb-1">Proteína (g)</span>
            <input type="number" id="pro-breakfast" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-3 px-3 font-semibold text-slate-700 outline-none focus:border-app-sage" placeholder="0" />
          </label>
        </div>
        <label class="flex flex-col mb-4">
          <span class="text-xs font-bold text-slate-500 mb-1">¿Qué comiste?</span>
          <textarea id="desc-breakfast" rows="2" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm text-slate-700 outline-none focus:border-app-sage" placeholder="Ej: Tostadas con aguacate..."></textarea>
        </label>
        <button id="btn-breakfast" class="w-full py-3 rounded-xl bg-app-sagedeep text-white font-bold text-sm active:scale-95 transition-transform">Cerrar comida</button>
      </article>

      <!-- ALMUERZO -->
      <article class="bg-app-panel rounded-2xl p-5 shadow-sm border border-slate-100 transition-all duration-300" id="card-lunch">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <span class="w-8 h-8 rounded-full bg-green-100 text-app-sagedeep flex items-center justify-center font-bold text-sm">02</span>
            <h2 class="font-extrabold text-lg">Almuerzo</h2>
          </div>
          <span class="text-xs font-bold px-3 py-1 rounded-full bg-slate-100 text-slate-500" id="state-lunch">Abierta</span>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-3">
          <label class="flex flex-col">
            <span class="text-xs font-bold text-slate-500 mb-1">Calorías</span>
            <input type="number" id="cal-lunch" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-3 px-3 font-semibold text-slate-700 outline-none focus:border-app-sage" placeholder="0" />
          </label>
          <label class="flex flex-col">
            <span class="text-xs font-bold text-slate-500 mb-1">Proteína (g)</span>
            <input type="number" id="pro-lunch" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-3 px-3 font-semibold text-slate-700 outline-none focus:border-app-sage" placeholder="0" />
          </label>
        </div>
        <label class="flex flex-col mb-4">
          <span class="text-xs font-bold text-slate-500 mb-1">¿Qué comiste?</span>
          <textarea id="desc-lunch" rows="2" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm text-slate-700 outline-none focus:border-app-sage" placeholder="Ej: Pechuga con arroz..."></textarea>
        </label>
        <button id="btn-lunch" class="w-full py-3 rounded-xl bg-app-sagedeep text-white font-bold text-sm active:scale-95 transition-transform">Cerrar comida</button>
      </article>

      <!-- CENA -->
      <article class="bg-app-panel rounded-2xl p-5 shadow-sm border border-slate-100 transition-all duration-300" id="card-dinner">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3">
            <span class="w-8 h-8 rounded-full bg-green-100 text-app-sagedeep flex items-center justify-center font-bold text-sm">03</span>
            <h2 class="font-extrabold text-lg">Cena</h2>
          </div>
          <span class="text-xs font-bold px-3 py-1 rounded-full bg-slate-100 text-slate-500" id="state-dinner">Abierta</span>
        </div>
        
        <div class="grid grid-cols-2 gap-3 mb-3">
          <label class="flex flex-col">
            <span class="text-xs font-bold text-slate-500 mb-1">Calorías</span>
            <input type="number" id="cal-dinner" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-3 px-3 font-semibold text-slate-700 outline-none focus:border-app-sage" placeholder="0" />
          </label>
          <label class="flex flex-col">
            <span class="text-xs font-bold text-slate-500 mb-1">Proteína (g)</span>
            <input type="number" id="pro-dinner" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-3 px-3 font-semibold text-slate-700 outline-none focus:border-app-sage" placeholder="0" />
          </label>
        </div>
        <label class="flex flex-col mb-4">
          <span class="text-xs font-bold text-slate-500 mb-1">¿Qué comiste?</span>
          <textarea id="desc-dinner" rows="2" class="w-full bg-slate-50 border border-slate-200 rounded-lg py-2 px-3 text-sm text-slate-700 outline-none focus:border-app-sage" placeholder="Ej: Ensalada de atún..."></textarea>
        </label>
        <button id="btn-dinner" class="w-full py-3 rounded-xl bg-app-sagedeep text-white font-bold text-sm active:scale-95 transition-transform">Cerrar comida</button>
      </article>

    </section>

    <section id="suggestionsPanel" class="px-5 mt-8 mb-8 hidden">
      <div class="bg-app-sagedeep rounded-2xl p-5 shadow-lg text-white">
        <p class="text-green-300 text-xs font-bold uppercase tracking-wider mb-1">Falta 1 comida</p>
        <h2 class="text-xl font-extrabold mb-4">Ideas para completar tu día</h2>
        
        <div class="flex flex-col gap-3 mb-5">
          <input id="searchIdeas" type="search" class="w-full bg-white/10 border border-white/20 text-white placeholder-green-100/50 rounded-xl py-3 px-4 outline-none focus:border-green-400" placeholder="Buscar ingrediente (ej. pollo)" />
          
          <label class="flex items-center justify-between bg-white/5 rounded-xl px-4 py-2 border border-white/10">
            <span class="text-sm font-semibold">Max kcal:</span>
            <input id="maxCalories" type="number" class="w-20 bg-transparent text-right font-bold outline-none text-white" />
          </label>
        </div>

        <!-- Contenedor donde se insertan las ideas con JS -->
        <div id="ideasGrid" class="flex flex-col gap-3">
          <!-- Renderizado dinámico -->
        </div>
      </div>
    </section>
  </main>

  <script>
    try {
      const STORAGE_KEY = "planner_mobile_v3";
      
      let state = {
        dailyBudget: 2000,
        proteinBudget: 150,
        meals: {
          breakfast: { calories: "", protein: "", description: "", closed: false },
          lunch: { calories: "", protein: "", description: "", closed: false },
          dinner: { calories: "", protein: "", description: "", closed: false }
        }
      };

      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) state = JSON.parse(saved);
      } catch (e) {
        console.warn("No se pudo cargar", e);
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      // Base de datos de ideas
      const mealIdeas = [
        { name: "Tortilla francesa con pan integral", calories: 360, protein: 24, prep: "Huevos, pan integral y tomate." },
        { name: "Bowl de yogur griego con avena", calories: 420, protein: 32, prep: "Yogur griego, avena, frutos rojos." },
        { name: "Wrap de pollo y aguacate", calories: 520, protein: 38, prep: "Tortilla, pollo, aguacate, lechuga." },
        { name: "Ensalada de atún y garbanzos", calories: 480, protein: 34, prep: "Atún, garbanzos, pepino, tomate." },
        { name: "Pavo con arroz microondas", calories: 510, protein: 42, prep: "Pechuga de pavo, arroz, verduras." },
        { name: "Huevos revueltos", calories: 390, protein: 31, prep: "Huevos, claras, queso fresco, tostada." },
        { name: "Sándwich de pollo", calories: 450, protein: 36, prep: "Pan integral, pollo, tomate." },
        { name: "Merluza con patata", calories: 430, protein: 35, prep: "Merluza, patata cocida, limón." }
      ];

      const dom = {
        bCal: document.getElementById('dailyBudget'),
        bPro: document.getElementById('proteinBudget'),
        uCal: document.getElementById('caloriesUsed'),
        lCal: document.getElementById('caloriesLeft'),
        tPro: document.getElementById('proteinTotal'),
        lPro: document.getElementById('proteinLeft'),
        pBar: document.getElementById('progressBar'),
        pPro: document.getElementById('proteinProgressBar'),
        txtC: document.getElementById('progressText'),
        txtP: document.getElementById('proteinProgressText'),
        txtM: document.getElementById('closedMealsText'),
        panelS: document.getElementById('suggestionsPanel'),
        maxC: document.getElementById('maxCalories'),
        search: document.getElementById('searchIdeas'),
        grid: document.getElementById('ideasGrid')
      };

      function updateUI() {
        let totals = { cal: 0, pro: 0, closed: 0 };
        ['breakfast', 'lunch', 'dinner'].forEach(m => {
          if (state.meals[m].closed) {
            totals.cal += Number(state.meals[m].calories) || 0;
            totals.pro += Number(state.meals[m].protein) || 0;
            totals.closed++;
          }
        });

        const bgCal = Number(state.dailyBudget) || 0;
        const bgPro = Number(state.proteinBudget) || 0;
        const leftCal = Math.max(0, bgCal - totals.cal);
        
        dom.uCal.textContent = totals.cal;
        dom.lCal.textContent = leftCal;
        dom.tPro.textContent = totals.pro + " g";
        dom.lPro.textContent = Math.max(0, bgPro - totals.pro) + " g";

        let percCal = bgCal > 0 ? Math.min(100, (totals.cal / bgCal) * 100) : 0;
        let percPro = bgPro > 0 ? Math.min(100, (totals.pro / bgPro) * 100) : 0;
        
        dom.pBar.style.width = percCal + "%";
        dom.pPro.style.width = percPro + "%";
        dom.txtC.textContent = Math.round(percCal) + "%";
        dom.txtP.textContent = Math.round(percPro) + "%";
        dom.txtM.textContent = totals.closed + " comidas listas";

        // Actualizar visual de las tarjetas
        ['breakfast', 'lunch', 'dinner'].forEach(meal => {
          const isClosed = state.meals[meal].closed;
          const card = document.getElementById('card-' + meal);
          const btn = document.getElementById('btn-' + meal);
          const lbl = document.getElementById('state-' + meal);
          
          ['cal', 'pro', 'desc'].forEach(p => document.getElementById(`${p}-${meal}`).disabled = isClosed);
          
          if (isClosed) {
            card.className = "bg-green-50 rounded-2xl p-5 shadow-sm border border-green-200 transition-all duration-300";
            btn.className = "w-full py-3 rounded-xl bg-white text-app-sagedeep border border-green-300 font-bold text-sm active:scale-95 transition-transform";
            btn.textContent = "Abrir para editar";
            lbl.className = "text-xs font-bold px-3 py-1 rounded-full bg-green-200 text-green-800";
            lbl.textContent = "Completada";
          } else {
            card.className = "bg-app-panel rounded-2xl p-5 shadow-sm border border-slate-100 transition-all duration-300";
            btn.className = "w-full py-3 rounded-xl bg-app-sagedeep text-white font-bold text-sm active:scale-95 transition-transform";
            btn.textContent = "Cerrar comida";
            lbl.className = "text-xs font-bold px-3 py-1 rounded-full bg-slate-100 text-slate-500";
            lbl.textContent = "Abierta";
          }
        });

        // Sugerencias
        if (totals.closed >= 2) {
          dom.panelS.classList.remove('hidden');
          if (document.activeElement !== dom.maxC) dom.maxC.value = leftCal;
          renderIdeas(leftCal);
        } else {
          dom.panelS.classList.add('hidden');
        }
      }

      function renderIdeas(targetCal) {
        const query = dom.search.value.toLowerCase().trim();
        const max = Number(dom.maxC.value) || targetCal;
        
        let filtered = mealIdeas.filter(i => i.calories <= (max + 100) && (!query || i.name.toLowerCase().includes(query) || i.prep.toLowerCase().includes(query)));
        filtered.sort((a, b) => Math.abs(a.calories - max) - Math.abs(b.calories - max));
        
        if (filtered.length === 0) {
          dom.grid.innerHTML = '<div class="bg-white/10 p-4 rounded-xl text-sm text-center text-green-100">No hay ideas para esa búsqueda.</div>';
          return;
        }

        dom.grid.innerHTML = filtered.slice(0, 5).map(idea => `
          <div class="bg-white/10 border border-white/10 rounded-xl p-4">
            <div class="flex justify-between items-start mb-2">
              <h3 class="font-bold text-sm text-white pr-2">${idea.name}</h3>
              <div class="flex flex-col items-end shrink-0">
                <span class="text-xs font-extrabold text-app-gold">${idea.calories} kcal</span>
                <span class="text-xs font-bold text-blue-200">${idea.protein}g prot</span>
              </div>
            </div>
            <p class="text-xs text-green-100 opacity-90 leading-relaxed">${idea.prep}</p>
          </div>
        `).join('');
      }

      // Inicializar Inputs
      dom.bCal.value = state.dailyBudget;
      dom.bPro.value = state.proteinBudget;
      dom.bCal.addEventListener('input', e => { state.dailyBudget = e.target.value; saveState(); updateUI(); });
      dom.bPro.addEventListener('input', e => { state.proteinBudget = e.target.value; saveState(); updateUI(); });
      dom.search.addEventListener('input', () => updateUI());
      dom.maxC.addEventListener('input', () => updateUI());

      // Listeners de Comidas
      ['breakfast', 'lunch', 'dinner'].forEach(meal => {
        ['cal', 'pro', 'desc'].forEach(p => {
          const el = document.getElementById(`${p}-${meal}`);
          el.value = state.meals[meal][p === 'cal' ? 'calories' : p === 'pro' ? 'protein' : 'description'] || "";
          el.addEventListener('input', e => {
            if (p === 'cal') state.meals[meal].calories = e.target.value;
            if (p === 'pro') state.meals[meal].protein = e.target.value;
            if (p === 'desc') state.meals[meal].description = e.target.value;
            saveState();
            updateUI();
          });
        });

        // Botón cerrar sin usar alert()
        document.getElementById('btn-' + meal).addEventListener('click', (e) => {
          const m = state.meals[meal];
          const btn = e.target;
          
          if (m.closed) {
            m.closed = false;
          } else {
            if (Number(m.calories) > 0 && Number(m.protein) > 0) {
              m.closed = true;
            } else {
              // Animación de error visual en lugar de alert()
              const originalText = btn.textContent;
              btn.textContent = "Faltan datos (Kcal / Prot)";
              btn.classList.add('bg-app-tomato');
              btn.classList.remove('bg-app-sagedeep');
              setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('bg-app-tomato');
                btn.classList.add('bg-app-sagedeep');
              }, 2000);
              return;
            }
          }
          saveState();
          updateUI();
        });
      });

      // Botón Limpiar sin usar confirm()
      let resetClicks = 0;
      const resetBtn = document.getElementById('resetDay');
      resetBtn.addEventListener('click', () => {
        if (resetClicks === 0) {
          resetClicks++;
          resetBtn.textContent = "¿Seguro? Toca de nuevo";
          resetBtn.className = "text-white text-sm font-bold px-4 py-2 rounded-lg bg-app-tomato transition-colors";
          setTimeout(() => {
            resetClicks = 0;
            resetBtn.textContent = "Limpiar día";
            resetBtn.className = "text-app-tomato text-sm font-bold px-4 py-2 rounded-lg border border-app-tomato/30 bg-red-50 transition-colors";
          }, 3000);
        } else {
          // Confirmado
          state.meals = {
            breakfast: { calories: "", protein: "", description: "", closed: false },
            lunch: { calories: "", protein: "", description: "", closed: false },
            dinner: { calories: "", protein: "", description: "", closed: false }
          };
          ['breakfast', 'lunch', 'dinner'].forEach(m => {
            document.getElementById('cal-' + m).value = "";
            document.getElementById('pro-' + m).value = "";
            document.getElementById('desc-' + m).value = "";
          });
          saveState();
          updateUI();
          resetClicks = 0;
          resetBtn.textContent = "Limpiar día";
          resetBtn.className = "text-app-tomato text-sm font-bold px-4 py-2 rounded-lg border border-app-tomato/30 bg-red-50 transition-colors";
        }
      });

      updateUI();
      
    } catch (e) {
      document.body.innerHTML = `<div class="p-10 text-center font-bold text-red-600">Error: ${e.message}</div>`;
    }
  </script>
</body>
</html>
