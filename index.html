<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Recetas por Calorías</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            app: {
              bg: '#f6f3ed',
              panel: '#ffffff',
              sage: '#43695a',
              sagedeep: '#24483c',
              tomato: '#c7533d',
              gold: '#d29d30',
              blue: '#38698a',
            }
          }
        }
      }
    }
  </script>

  <style>
    body { background-color: #f6f3ed; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 0px; background: transparent; }
    input[type="number"] { font-size: 24px !important; -moz-appearance: textfield; }
    input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    
    .loader { border: 4px solid #e2e8f0; border-top: 4px solid #43695a; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="text-slate-800 antialiased pb-20">

  <main class="max-w-md mx-auto bg-app-bg min-h-screen shadow-2xl relative flex flex-col">
    
    <header class="bg-app-panel px-6 py-8 rounded-b-3xl shadow-sm z-10 relative text-center">
      <div class="w-16 h-16 bg-green-50 rounded-2xl mx-auto flex items-center justify-center mb-4">
        <svg class="w-8 h-8 text-app-sage" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
      </div>
      <h1 class="text-3xl font-extrabold text-app-sagedeep leading-tight mb-2">Chef Inteligente</h1>
      <p class="text-slate-500 text-sm font-medium">Calorías, macros y recetas fáciles.</p>
    </header>

    <section class="px-5 mt-8">
      <div class="bg-app-panel rounded-3xl p-6 shadow-sm border border-slate-100 flex flex-col items-center gap-5">
        <div class="w-full flex bg-slate-100 rounded-xl p-1">
          <label class="flex-1 text-center cursor-pointer relative">
            <input type="radio" name="flavor" value="salada" class="peer sr-only" checked />
            <div class="py-2.5 rounded-lg peer-checked:bg-white peer-checked:shadow-sm peer-checked:text-app-sagedeep font-bold text-slate-400 text-sm transition-all flex items-center justify-center gap-2"><span>🧂 Salado</span></div>
          </label>
          <label class="flex-1 text-center cursor-pointer relative">
            <input type="radio" name="flavor" value="dulce" class="peer sr-only" />
            <div class="py-2.5 rounded-lg peer-checked:bg-white peer-checked:shadow-sm peer-checked:text-app-tomato font-bold text-slate-400 text-sm transition-all flex items-center justify-center gap-2"><span>🍰 Dulce</span></div>
          </label>
        </div>

        <label class="w-full text-center">
          <span class="text-sm font-bold text-slate-400 uppercase tracking-widest block mb-3">Tus Calorías</span>
          <div class="relative flex items-center justify-center max-w-[200px] mx-auto">
            <input id="caloriesInput" type="number" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-4 px-4 text-center font-black text-slate-700 outline-none focus:border-app-sage focus:bg-white transition-colors" placeholder="Ej: 450" />
            <span class="absolute right-4 text-slate-400 font-bold">kcal</span>
          </div>
        </label>
        
        <button id="generateBtn" class="w-full py-4 rounded-2xl bg-app-sagedeep text-white font-extrabold text-lg active:scale-95 transition-transform shadow-md hover:bg-app-sage flex justify-center items-center gap-2">
          <span>Generar Receta</span>
        </button>
      </div>
      <div id="errorMsg" class="hidden mt-4 p-4 rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm font-semibold text-center"></div>
    </section>

    <section id="loadingState" class="px-5 mt-10 hidden flex-col items-center justify-center gap-4 opacity-0 transition-opacity duration-300">
      <div class="loader"></div>
      <p class="text-app-sage font-bold animate-pulse text-center">Consultando al Chef...</p>
    </section>

    <section id="recipeResult" class="px-5 mt-8 mb-10 hidden opacity-0 transition-opacity duration-500 translate-y-4">
      <div class="bg-app-panel rounded-3xl p-6 shadow-lg border border-slate-100 relative overflow-hidden">
        <div class="relative z-10">
          <div class="flex items-start justify-between gap-4 mb-2">
            <h2 id="recipeTitle" class="text-2xl font-extrabold text-slate-800 leading-tight"></h2>
          </div>
          
          <div class="flex gap-2 mb-4">
            <div class="bg-app-gold text-white text-xs font-black px-3 py-1.5 rounded-xl shadow-sm"><span id="recipeKcal">0</span> kcal</div>
            <div class="bg-app-blue text-white text-xs font-black px-3 py-1.5 rounded-xl shadow-sm"><span id="recipeProtein">0</span>g prot</div>
          </div>
          
          <p id="recipeDesc" class="text-slate-500 text-sm font-medium mb-6 italic"></p>
          
          <div class="mb-6">
            <h3 class="text-sm font-bold text-app-sagedeep uppercase tracking-widest mb-3 flex items-center gap-2">Ingredientes</h3>
            <ul id="ingredientsList" class="flex flex-col gap-2"></ul>
          </div>
          
          <div>
            <h3 class="text-sm font-bold text-app-sagedeep uppercase tracking-widest mb-3 flex items-center gap-2">Instrucciones</h3>
            <ol id="instructionsList" class="flex flex-col gap-4"></ol>
          </div>
          
          <button id="nextBtn" class="w-full mt-8 py-4 rounded-xl border-2 border-app-sage text-app-sagedeep font-extrabold text-sm hover:bg-green-50 active:scale-95 transition-all">Siguiente opción</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const dom = {
      input: document.getElementById('caloriesInput'),
      btn: document.getElementById('generateBtn'),
      nextBtn: document.getElementById('nextBtn'),
      error: document.getElementById('errorMsg'),
      loading: document.getElementById('loadingState'),
      result: document.getElementById('recipeResult'),
      title: document.getElementById('recipeTitle'),
      kcal: document.getElementById('recipeKcal'),
      protein: document.getElementById('recipeProtein'),
      desc: document.getElementById('recipeDesc'),
      ingList: document.getElementById('ingredientsList'),
      instList: document.getElementById('instructionsList')
    };

    function setUIState(state) {
      if (state === 'idle') {
        dom.loading.classList.add('hidden');
        dom.btn.disabled = false;
        dom.btn.textContent = 'Generar Receta';
      } else if (state === 'loading') {
        dom.result.classList.add('hidden');
        dom.error.classList.add('hidden');
        dom.btn.disabled = true;
        dom.btn.textContent = 'Cocinando...';
        dom.loading.classList.remove('hidden');
        setTimeout(() => dom.loading.style.opacity = '1', 10);
      } else if (state === 'success') {
        dom.loading.classList.add('hidden');
        dom.btn.disabled = false;
        dom.btn.textContent = 'Generar otra';
        dom.result.classList.remove('hidden');
        setTimeout(() => { dom.result.style.opacity = '1'; dom.result.style.transform = 'translateY(0)'; }, 50);
      } else if (state === 'error') {
        dom.loading.classList.add('hidden');
        dom.btn.disabled = false;
        dom.error.classList.remove('hidden');
      }
    }

    async function generateRecipe(calories) {
      setUIState('loading');
      const flavor = document.querySelector('input[name="flavor"]:checked').value;
      const variant = Math.floor(Math.random() * 10000); 
      
      const apiKey = "";
      const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;

      const payload = {
        contents: [{ role: "user", parts: [{ text: `Crea una receta ${flavor} realista, MUY FÁCIL y rápida de preparar, que contenga aproximadamente ${calories} calorías en total. Incluye el contenido aproximado de proteína en gramos. (ID de variante: ${variant}).` }] }],
        systemInstruction: { parts: [{ text: "Chef experto en recetas exprés (pocos ingredientes, mínimo esfuerzo). Responde EXCLUSIVAMENTE en JSON. Campos: recipeName, calories, protein (integer), description, ingredients (item, quantity), instructions (array)." }] },
        generationConfig: { responseMimeType: "application/json" }
      };

      try {
        const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        const result = await response.json();
        const recipeData = JSON.parse(result.candidates[0].content.parts[0].text);
        renderRecipe(recipeData);
      } catch (error) {
        dom.error.textContent = "Error al conectar con el Chef. Intenta de nuevo.";
        setUIState('error');
      }
    }

    function renderRecipe(data) {
      dom.title.textContent = data.recipeName;
      dom.kcal.textContent = data.calories;
      dom.protein.textContent = data.protein || "0";
      dom.desc.textContent = `"${data.description}"`;
      dom.ingList.innerHTML = '';
      dom.instList.innerHTML = '';

      data.ingredients.forEach(ing => {
        const li = document.createElement('li');
        li.className = "flex justify-between items-center bg-slate-50 py-2 px-3 rounded-lg border border-slate-100 text-sm";
        li.innerHTML = `<span class="font-semibold text-slate-700">${ing.item}</span><span class="font-bold text-app-sage text-right shrink-0 ml-4">${ing.quantity}</span>`;
        dom.ingList.appendChild(li);
      });

      data.instructions.forEach((step, index) => {
        const li = document.createElement('li');
        li.className = "flex gap-3 text-sm text-slate-600 leading-relaxed";
        li.innerHTML = `<span class="flex items-center justify-center w-6 h-6 rounded-full bg-green-100 text-app-sagedeep font-black text-xs shrink-0 mt-0.5">${index + 1}</span><span>${step}</span>`;
        dom.instList.appendChild(li);
      });

      setUIState('success');
    }

    dom.btn.addEventListener('click', () => {
      const cals = parseInt(dom.input.value, 10);
      if (isNaN(cals) || cals < 50 || cals > 5000) {
        dom.error.textContent = "Ingresa un valor válido (50 - 5000 kcal).";
        dom.error.classList.remove('hidden');
        return;
      }
      generateRecipe(cals);
    });
    
    dom.nextBtn.addEventListener('click', () => generateRecipe(parseInt(dom.input.value, 10)));
  </script>
</body>
</html>
